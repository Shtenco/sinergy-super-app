name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > mobile/android/local.properties
    
    - name: Download GGUF Model
      run: |
        mkdir -p mobile/app/src/main/assets
        curl -L -o mobile/app/src/main/assets/Qwen3.5-0.8B-Q4_K_M.gguf \
        "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf"
    
    - name: Build APK
      run: |
        cd mobile/android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sinergyapp
        path: mobile/android/app/build/outputs/apk/debug/app-debug.apk